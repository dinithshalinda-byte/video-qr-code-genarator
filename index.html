<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Video/File to QR Code | Catbox.moe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js">
    </script>
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-lg w-full text-center border border-gray-100">
        
        <!-- Header -->
        <div class="mb-6">
            <div class="text-5xl mb-3">📤</div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">File Upload කරන්න</h1>
            <p class="text-gray-500 text-sm">Video, Audio, PDF, Zip - ඕනෑම දෙයක්!</p>
            <div class="mt-3 inline-block bg-gradient-to-r from-green-400 to-blue-500 text-white text-xs font-bold px-4 py-1.5 rounded-full">
                ✅ FREE & PERMANENT
            </div>
        </div>

        <!-- Upload Area -->
        <label for="fileInput" class="cursor-pointer">
            <div id="dropZone" class="border-3 border-dashed border-gray-300 rounded-2xl p-8 hover:border-purple-500 hover:bg-purple-50 transition-all duration-300 transform hover:scale-[1.02]">
                <div id="placeholderArea">
                    <svg class="mx-auto h-16 w-16 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <p class="mt-4 text-base font-semibold text-gray-700">මෙතන Click කරන්න</p>
                    <p class="text-sm text-gray-500">හෝ File එක Drag & Drop කරන්න</p>
                    <p class="text-xs text-orange-500 mt-2 font-medium">⚠️ Max Size: 200MB</p>
                </div>
                <div id="previewArea" class="hidden">
                    <div class="text-5xl mb-2" id="fileIcon">📄</div>
                    <p id="fileName" class="font-medium text-gray-700 text-sm break-all"></p>
                    <p id="fileSize" class="text-sm text-gray-500 mt-1"></p>
                </div>
            </div>
            <input type="file" id="fileInput" class="hidden" />
        </label>

        <!-- Status -->
        <div id="status" class="mt-5 text-sm font-medium text-purple-600 bg-purple-50 py-3 px-4 rounded-lg hidden">
            <span id="statusText">⏳ Uploading...</span>
            <div id="progressContainer" class="mt-2 bg-gray-200 rounded-full h-3 hidden">
                <div id="progressFill" class="bg-gradient-to-r from-purple-600 to-blue-600 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <p id="progressPercent" class="text-xs text-gray-500 mt-1 hidden">0%</p>
        </div>

        <!-- Result -->
        <div id="resultArea" class="mt-6 hidden">
            <p class="text-gray-700 font-semibold mb-3">✨ QR Code එක</p>
            <div class="bg-gray-50 p-5 rounded-2xl inline-block shadow-inner">
                <canvas id="qrCanvas" class="mx-auto"></canvas>
            </div>
            
            <a id="downloadLink" class="mt-5 inline-flex items-center bg-gradient-to-r from-purple-600 to-blue-600 text-white px-6 py-3 rounded-xl hover:from-purple-700 hover:to-blue-700 transition-all shadow-lg hover:shadow-xl cursor-pointer font-medium">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                QR Download කරන්න
            </a>

            <div class="mt-5 bg-gray-50 p-4 rounded-2xl text-left border">
                <p class="text-xs text-gray-500 mb-1">🔗 File Link:</p>
                <a id="fileLink" href="#" target="_blank" class="text-blue-600 underline text-sm break-all font-mono"></a>
                <div class="flex gap-2 mt-3">
                    <button onclick="copyLink()" class="flex-1 text-xs bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded-xl transition font-medium">
                        📋 Copy Link
                    </button>
                    <button onclick="shareLink()" class="flex-1 text-xs bg-green-100 hover:bg-green-200 text-green-700 px-3 py-2 rounded-xl transition font-medium">
                        📤 Share
                    </button>
                </div>
            </div>
        </div>

        <!-- Info -->
        <p class="text-xs text-gray-400 mt-6">Powered by <a href="https://catbox.moe" target="_blank" class="underline">Catbox.moe</a> | 100% Free & Permanent</p>
    </div>

    <script>
        // DOM Elements
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const placeholderArea = document.getElementById('placeholderArea');
        const previewArea = document.getElementById('previewArea');
        const fileIcon = document.getElementById('fileIcon');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const statusDiv = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const resultArea = document.getElementById('resultArea');
        const qrCanvas = document.getElementById('qrCanvas');
        const downloadLink = document.getElementById('downloadLink');
        const fileLink = document.getElementById('fileLink');

        // File Input
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) processFile(file);
        });

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-purple-500', 'bg-purple-50');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-purple-500', 'bg-purple-50');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-purple-500', 'bg-purple-50');
            const file = e.dataTransfer.files[0];
            if (file) processFile(file);
        });

        function processFile(file) {
            // Size Check (200MB)
            if (file.size > 200 * 1024 * 1024) {
                alert('❌ File Size එක 200MB ට වැඩියි! කරුණාකර කුඩා File එකක් තෝරන්න.');
                return;
            }

            // Show Preview with correct icon
            const ext = file.name.split('.').pop().toLowerCase();
            if (['mp4', 'avi', 'mkv', 'mov', 'webm'].includes(ext)) {
                fileIcon.textContent = '🎬';
            } else if (['mp3', 'wav', 'ogg'].includes(ext)) {
                fileIcon.textContent = '🎵';
            } else if (['pdf'].includes(ext)) {
                fileIcon.textContent = '📕';
            } else if (['zip', 'rar', '7z'].includes(ext)) {
                fileIcon.textContent = '🗜️';
            } else {
                fileIcon.textContent = '📄';
            }

            fileName.textContent = file.name;
            fileSize.textContent = `📦 ${(file.size / (1024 * 1024)).toFixed(2)} MB`;
            placeholderArea.classList.add('hidden');
            previewArea.classList.remove('hidden');

            uploadToCatbox(file);
        }

        function uploadToCatbox(file) {
            statusText.textContent = '⏳ Upload වෙමින් පවතී...';
            statusDiv.classList.remove('hidden');
            progressContainer.classList.remove('hidden');
            progressPercent.classList.remove('hidden');
            resultArea.classList.add('hidden');

            const formData = new FormData();
            formData.append('reqtype', 'fileupload');
            formData.append('fileToUpload', file);

            // XMLHttpRequest for progress tracking
            const xhr = new XMLHttpRequest();

            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    progressFill.style.width = percent + '%';
                    progressPercent.textContent = percent + '%';
                }
            });

            xhr.addEventListener('load', () => {
                if (xhr.status === 200) {
                    const fileUrl = xhr.responseText.trim();
                    
                    if (fileUrl.startsWith('http')) {
                        statusText.textContent = '✅ Upload සාර්ථකයි! QR Code හදමින්...';
                        progressFill.style.width = '100%';
                        progressPercent.textContent = '100%';

                        setTimeout(() => {
                            progressContainer.classList.add('hidden');
                            progressPercent.classList.add('hidden');
                            generateQRCode(fileUrl);
                        }, 1000);
                    } else {
                        statusText.textContent = '❌ Upload Fail! Response: ' + fileUrl;
                        progressContainer.classList.add('hidden');
                        progressPercent.classList.add('hidden');
                    }
                } else {
                    statusText.textContent = '❌ Server Error! Status: ' + xhr.status;
                    progressContainer.classList.add('hidden');
                    progressPercent.classList.add('hidden');
                }
            });

            xhr.addEventListener('error', () => {
                statusText.textContent = '❌ Network Error! Internet Check කරන්න.';
                progressContainer.classList.add('hidden');
                progressPercent.classList.add('hidden');
            });

            xhr.open('POST', 'https://catbox.moe/user/api.php', true);
            xhr.send(formData);
        }

        function generateQRCode(url) {
            setTimeout(() => {
                statusDiv.classList.add('hidden');
                resultArea.classList.remove('hidden');

                QRCode.toCanvas(qrCanvas, url, {
                    width: 220,
                    margin: 2,
                    color: { dark: '#1e1b4b', light: '#FFFFFF' }
                }, (error) => {
                    if (error) console.error('QR Error:', error);
                });

                fileLink.href = url;
                fileLink.textContent = url;

                downloadLink.onclick = () => {
                    const qrImage = qrCanvas.toDataURL("image/png");
                    downloadLink.href = qrImage;
                    downloadLink.download = 'file-qr-code.png';
                };
            }, 500);
        }

        function copyLink() {
            navigator.clipboard.writeText(fileLink.textContent).then(() => {
                alert('✅ Link Copy කරා!');
            }).catch(() => {
                prompt('මෙන්න Link එක:', fileLink.textContent);
            });
        }

        function shareLink() {
            if (navigator.share) {
                navigator.share({
                    title: 'Shared File',
                    text: 'මෙන්න File Link එක:',
                    url: fileLink.textContent,
                });
            } else {
                alert('Share Feature එක මේ Browser එකේ නැහැ. Link Copy කරගන්න.');
            }
        }
    </script>
</body>
</html>
